<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar System Clock</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.2/p5.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: center;
      min-height: 100vh;
      background: #060608;
      color: white;
      font-family: 'Georgia', serif;
      gap: 8px;
      padding: 10px;
    }
    /* sidebar defined below in toggle section */
    .panel {
      background: linear-gradient(160deg, #0e0e14 0%, #0a0a10 100%);
      border: 1px solid #1e1e2e;
      border-radius: 10px;
      padding: 11px 13px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    .panel h3 {
      margin: 0 0 9px 0;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #778;
      border-bottom: 1px solid #161622;
      padding-bottom: 6px;
      font-family: Arial, sans-serif;
    }
    .date-row .inputs { display: flex; gap: 6px; margin-bottom: 6px; }
    input[type="date"], input[type="time"] {
      background: #0d0d16; border: 1px solid #252535; color: #aab;
      padding: 5px 6px; border-radius: 5px; font-size: 13px; font-family: Arial, sans-serif;
    }
    input[type="date"] { flex: 2; }
    input[type="time"] { flex: 1; }
    .btn-row { display: flex; gap: 6px; }
    button {
      background: #0f0f1a; border: 1px solid #252535; color: #99a;
      padding: 5px 8px; border-radius: 5px; cursor: pointer; font-size: 12px; flex: 1;
      font-family: Arial, sans-serif; transition: all 0.15s;
    }
    button:hover { background: #181828; border-color: #3a3a5a; color: #ccf; }
    .nav-row { display: flex; gap: 4px; margin-top: 6px; align-items: center; }
    .nav-row label { font-size: 12px; color: #667; flex: 1; text-align: center; font-family: Arial, sans-serif; }
    .nav-btn {
      background: #0d0d1a; border: 1px solid #252535; color: #778;
      padding: 4px 0; border-radius: 5px; cursor: pointer; font-size: 13px;
      flex: 1; text-align: center; line-height: 1; transition: all 0.15s;
    }
    .nav-btn:hover { background: #151525; color: #aac; border-color: #3a3a5a; }
    .nav-step { display: flex; gap: 4px; margin-top: 3px; }
    .nav-step button { font-size: 11px; padding: 3px 0; flex: 1; color: #778; background: #0a0a14; border-color: #1a1a28; }
    .nav-step button:hover { color: #99f; background: #111120; }
    .err { color: #f87; font-size: 12px; display: none; margin-top: 4px; font-family: Arial, sans-serif; }
    .planet-row {
      display: flex; align-items: center; gap: 7px;
      margin-bottom: 7px; padding-bottom: 7px;
      border-bottom: 1px solid #111118;
    }
    .planet-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .pdot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .planet-row label { font-size: 13px; flex: 1; cursor: pointer; color: #aab; font-family: Arial, sans-serif; }
    .planet-row input[type="checkbox"] { cursor: pointer; accent-color: #66f; flex-shrink: 0; }
    .tol-wrap { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    input[type="range"] { width: 60px; cursor: pointer; accent-color: #66f; }
    .tol-val { font-size: 12px; color: #778; width: 32px; text-align: right; font-family: Arial, sans-serif; }
    .astat { font-size: 13px; line-height: 1.8; font-family: Arial, sans-serif; }
    .astat .ok  { color: #5f5; }
    .astat .no  { color: #557; }
    #similarList { max-height: 155px; overflow-y: auto; font-size: 13px; scrollbar-width: thin; scrollbar-color: #222 #0a0a14; }
    .sim-item { padding: 4px 6px; border-radius: 5px; cursor: pointer; border: 1px solid #181822; margin-bottom: 3px; transition: all 0.15s; }
    .sim-item:hover { background: #0f1f10; border-color: #2a4a2a; }
    .sim-item .sim-date { color: #8bf; font-weight: bold; font-family: Arial, sans-serif; }
    .sim-item .sim-detail { color: #667; font-size: 11px; font-family: Arial, sans-serif; }
    #simScanBtn { width: 100%; margin-bottom: 8px; }
    #simStatus { font-size: 12px; color: #667; margin-bottom: 6px; font-family: Arial, sans-serif; }
    .scan-dir-btn { flex:1; }
    .active-dir { border-color:#3a3a6a !important; color:#aaf !important; background:#12122a !important; }
    #canvas-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; min-width: 0; }
    canvas { border-radius: 6px; display: block; max-width: 100%; max-height: 100vh; }

    /* Sidebar toggle tab — fixed to left edge */
    #sidebarToggle {
      position: fixed; left: 0; top: 50%; transform: translateY(-50%);
      z-index: 100; width: 20px; height: 64px;
      background: #13131f; border: 1px solid #252535; border-left: none;
      border-radius: 0 7px 7px 0; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #667; font-size: 11px; transition: all 0.2s;
      user-select: none;
    }
    #sidebarToggle:hover { background: #1c1c30; color: #aaf; border-color: #3a3a5a; }

    /* Sidebar collapse transition */
    #sidebar {
      width: 270px; flex-shrink: 0;
      display: flex; flex-direction: column; gap: 10px;
      transition: width 0.28s ease, opacity 0.2s ease, margin 0.28s ease;
      overflow: hidden;
    }
    #sidebar.collapsed { width: 0; opacity: 0; margin-right: -8px; pointer-events: none; }

    body { padding-left: 22px; } /* room for toggle tab */

    @media (max-width: 700px) {
      body { flex-direction: column; align-items: stretch; padding: 6px; gap: 6px; }
      #sidebar { width: 100%; }
      #sidebar.collapsed { width: 100%; height: 0; margin: 0; opacity: 0; }
      #canvas-wrap { align-items: center; }
      canvas { max-height: 60vh; }
      button, input { min-height: 36px; font-size: 16px; }
      #sidebarToggle { display: none; }
    }
    .accordion-panel { }
    .accordion-header {
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none; margin: 0;
      padding-bottom: 0; border-bottom: none;
    }
    .accordion-header:hover .accordion-title { color: #99a; }
    .accordion-title {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em;
      color: #778; font-family: Arial, sans-serif; transition: color 0.15s;
    }
    .accordion-arrow {
      font-size: 11px; color: #667; transition: transform 0.2s; display: inline-block;
    }
    .accordion-arrow.open { transform: rotate(90deg); }
    .accordion-body { overflow: hidden; max-height: 0; transition: max-height 0.25s ease; }
    .accordion-body.open { max-height: 2000px; }
    .accordion-section { margin-top: 10px; padding-top: 10px; border-top: 1px solid #161622; }
    #savedList { max-height: 180px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #222 #0a0a14; margin-bottom: 8px; }
    .saved-item {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 6px; border-radius: 5px; border: 1px solid #181822;
      margin-bottom: 4px; background: #08080f;
    }
    .saved-item-info { flex: 1; min-width: 0; }
    .saved-item-title { font-size: 12px; color: #aab; font-family: Arial, sans-serif; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .saved-item-date  { font-size: 11px; color: #667; font-family: Arial, sans-serif; }
    .saved-item-btns  { display: flex; gap: 3px; flex-shrink: 0; }
    .saved-item-btns button {
      font-size: 10px; padding: 2px 5px; flex: none; color: #778;
      background: #0a0a14; border-color: #1a1a28; border-radius: 4px;
    }
    .saved-item-btns button:hover { color: #99f; border-color: #3a3a5a; background: #111120; }
    .saved-item-btns .del-btn:hover { color: #f66; border-color: #5a2020; }
    .save-row { display: flex; gap: 5px; margin-top: 6px; }
    .save-row input[type="text"] {
      flex: 1; background: #0d0d16; border: 1px solid #252535; color: #aab;
      padding: 4px 7px; border-radius: 5px; font-size: 12px; font-family: Arial, sans-serif;
    }
    .save-row input[type="text"]::placeholder { color: #334; }
    #saveCurrentBtn { flex: none; font-size: 11px; padding: 4px 8px; }
    .hist-group-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
      color: #667; font-family: Arial, sans-serif;
      margin: 8px 0 4px 0; padding-bottom: 3px; border-bottom: 1px solid #111118;
    }
    .hist-item {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 5px; border-radius: 4px; margin-bottom: 3px;
      border: 1px solid transparent; transition: border-color 0.12s;
    }
    .hist-item:hover { border-color: #1e1e2e; background: #08080f; }
    .hist-item-info { flex: 1; min-width: 0; }
    .hist-item-title { font-size: 12px; color: #aab; font-family: Arial, sans-serif; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hist-item-date  { font-size: 10px; color: #667; font-family: Arial, sans-serif; }
    .hist-item-btns  { display: flex; gap: 3px; flex-shrink: 0; }
    .hist-item-btns button {
      font-size: 10px; padding: 2px 5px; flex: none; color: #778;
      background: #0a0a14; border: 1px solid #1a1a28; border-radius: 4px; cursor: pointer;
    }
    .hist-item-btns button:hover { color: #99f; border-color: #3a3a5a; background: #111120; }
    #histList { max-height: 240px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #222 #0a0a14; }
    #histSearch {
      width: 100%; background: #0d0d16; border: 1px solid #252535; color: #aab;
      padding: 4px 7px; border-radius: 5px; font-size: 12px; font-family: Arial, sans-serif;
      margin-bottom: 7px; box-sizing: border-box;
    }
    #histSearch::placeholder { color: #334; }
  </style>
</head>
<body>

<button id="sidebarToggle" title="Toggle sidebar">◀</button>

<div id="sidebar">
  <div class="panel">
    <h3>&#9679; Primary Date</h3>
    <div class="date-row">
      <div class="inputs">
        <input type="date" id="customDate">
        <input type="time" id="customTime">
      </div>
    </div>
    <div class="btn-row">
      <button id="setDate">Set Date</button>
      <button id="resetDate">Reset to Now</button>
    </div>
    <div class="err" id="error"></div>
    <div class="nav-row" style="margin-top:8px;">
      <button class="nav-btn" id="navBack">&#9664;</button>
      <label id="navStepLabel">1 day</label>
      <button class="nav-btn" id="navFwd">&#9654;</button>
    </div>
    <div class="nav-step">
      <button data-step="1">Day</button>
      <button data-step="7">Week</button>
      <button data-step="30">Month</button>
      <button data-step="365">Year</button>
    </div>
  </div>

  <div class="panel">
    <h3>&#9675; Compare Date</h3>
    <div class="date-row">
      <div class="inputs">
        <input type="date" id="compareDate">
        <input type="time" id="compareTime">
      </div>
    </div>
    <div class="btn-row">
      <button id="setCompare">Set Compare</button>
      <button id="clearCompare">Clear</button>
    </div>
    <div class="err" id="error2"></div>
    <div id="compareNote" style="font-size:12px;color:#667;margin-top:5px;display:none;font-family:Arial,sans-serif;">Faded = compare date</div>
  </div>

  <div class="panel">
    <h3>&#9733; Saved Dates</h3>
    <div id="savedList"></div>
    <div class="save-row">
      <input type="text" id="saveName" placeholder="Label (e.g. My Birthday)">
      <button id="saveCurrentBtn">Save</button>
    </div>
    <div style="font-size:11px;color:#556;margin-top:5px;font-family:Arial,sans-serif;" id="saveMsg"></div>
  </div>

  <div class="panel accordion-panel">
    <div class="accordion-header" id="histHeader">
      <span class="accordion-title">&#9790; Historic Events</span>
      <span class="accordion-arrow" id="histArrow">&#9658;</span>
    </div>
    <div class="accordion-body" id="histBody">
      <div class="accordion-section" style="padding-top:8px;">
        <input type="text" id="histSearch" placeholder="Search events…">
        <div id="histList"></div>
      </div>
    </div>
  </div>

  <div class="panel accordion-panel">
    <div class="accordion-header" id="accordionHeader">
      <span class="accordion-title">&#9880; Alignments &amp; Analysis</span>
      <span class="accordion-arrow" id="accordionArrow">&#9658;</span>
    </div>
    <div class="accordion-body" id="accordionBody">
      <div class="accordion-section">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:#778;margin-bottom:8px;font-family:Arial,sans-serif;">Similar Alignments</div>
        <div style="display:flex;gap:5px;margin-bottom:7px;">
          <button class="scan-dir-btn active-dir" data-dir="both" style="font-size:11px;padding:4px 0;">⇄ Both</button>
          <button class="scan-dir-btn" data-dir="past" style="font-size:11px;padding:4px 0;">◀ Past</button>
          <button class="scan-dir-btn" data-dir="future" style="font-size:11px;padding:4px 0;">Future ▶</button>
        </div>
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
          <label style="font-size:11px;color:#667;font-family:Arial,sans-serif;white-space:nowrap;">Range:</label>
          <select id="scanRange" style="flex:1;background:#0a0a14;border:1px solid #1e1e2e;color:#88a;font-size:11px;padding:3px 5px;border-radius:4px;font-family:Arial,sans-serif;">
            <option value="100">± 100 years</option>
            <option value="1000">± 1,000 years</option>
            <option value="10000">± 10,000 years</option>
            <option value="100000">± 100,000 years</option>
            <option value="1000000">± 1 million years</option>
            <option value="100000000">± 100 million years</option>
            <option value="1000000000">± 1 billion years</option>
            <option value="4600000000">± 4.6 billion years</option>
          </select>
        </div>
        <button id="simScanBtn" style="width:100%;margin-bottom:8px;">Scan Alignments</button>
        <div id="simStatus" style="font-size:12px;color:#667;margin-bottom:6px;font-family:Arial,sans-serif;">Set direction &amp; range, then scan.</div>
        <div id="similarList"></div>
      </div>
      <div class="accordion-section">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:#778;margin-bottom:6px;font-family:Arial,sans-serif;">Alignment Settings</div>
        <div style="font-size:11px;color:#667;margin-bottom:8px;font-family:Arial,sans-serif;">Tolerance = % closeness required (100% = exact)</div>
        <div id="planetControls"></div>
      </div>
      <div class="accordion-section">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:#778;margin-bottom:6px;font-family:Arial,sans-serif;">Alignment Status</div>
        <div id="alignmentStatus" class="astat">—</div>
      </div>
    </div>
  </div>
</div>

<div id="canvas-wrap"></div>

<script>
const PLANETS = [
  { name: "Mercury", radius: 62,  period: 88,       color: [180,175,170], size: 8,  glowColor: [210,205,200] },
  { name: "Venus",   radius: 104, period: 224.7,    color: [255,210,120], size: 13, glowColor: [255,235,165] },
  { name: "Earth",   radius: 150, period: 365.25,   color: [ 70,140,255], size: 13, glowColor: [110,190,255] },
  { name: "Mars",    radius: 196, period: 687,       color: [220, 80, 50], size: 11, glowColor: [255,125, 85] },
  { name: "Jupiter", radius: 248, period: 4332.59,  color: [230,190,120], size: 22, glowColor: [255,215,155] },
  { name: "Saturn",  radius: 300, period: 10759.22, color: [210,185,140], size: 19, glowColor: [235,210,165] },
  { name: "Uranus",  radius: 346, period: 30688.5,  color: [100,230,220], size: 15, glowColor: [145,255,248] },
  { name: "Neptune", radius: 388, period: 60190,    color: [ 80,100,230], size: 15, glowColor: [105,135,255] }
];

const ORBIT_COLORS = [
  [160,155,150],[200,160,80],[50,100,200],[180,60,40],
  [180,140,80],[170,150,110],[60,180,170],[50,70,180],
];

const EPOCH_LONG = {
  Mercury: 252.25, Venus: 181.98, Earth: 100.46,
  Mars: 355.45, Jupiter: 34.40, Saturn: 49.94,
  Uranus: 313.23, Neptune: 304.88
};

let customDaysSinceJ2000 = null;
let compareDaysSinceJ2000 = null;
let planetSettings = {};
PLANETS.forEach(p => { planetSettings[p.name] = { enabled: true, tolerance: 80 }; });

function J2000() { return new Date(2000, 0, 1, 12, 0, 0); }
function daysFromDate(year, month, day, h=12, m=0) {
  return (new Date(year, month-1, day, h, m, 0) - J2000()) / 86400000;
}
function nowDays() { return (new Date() - J2000()) / 86400000; }

function helioLong(days, planet) {
  const L0 = EPOCH_LONG[planet.name] || 0;
  const period = planet.period;
  const dReduced = days - Math.trunc(days / period) * period;
  return ((L0 + (360 / period) * dReduced) % 360 + 360) % 360;
}
function angDiff(a, b) {
  let d = Math.abs(a - b) % 360;
  return d > 180 ? 360 - d : d;
}
function closenessPct(diffDeg) { return Math.max(0, 100 - (diffDeg / 180) * 100); }
function getPrimaryDays() { return customDaysSinceJ2000 !== null ? customDaysSinceJ2000 : nowDays(); }

function getCanvasRotationOffset(primaryDays) {
  let jan1Days;
  const absYr = Math.abs(primaryDays / 365.25);
  if (absYr < 100000) {
    const d = new Date(J2000().getTime() + primaryDays * 86400000);
    jan1Days = daysFromDate(d.getFullYear(), 1, 1);
  } else {
    const approxYear = primaryDays / 365.25;
    jan1Days = Math.floor(approxYear) * 365.25;
  }
  const L0earthRad = EPOCH_LONG['Earth'] * Math.PI / 180;
  const earthRawAtJan1 = L0earthRad + (Math.PI * 2 * jan1Days) / PLANETS[2].period;
  return -Math.PI / 2 - earthRawAtJan1;
}
function drawAngle(days, planet, rotOffset) {
  const L0rad = (EPOCH_LONG[planet.name] || 0) * Math.PI / 180;
  return L0rad + (Math.PI * 2 * days) / planet.period + rotOffset;
}

function daysToDateStr(days) {
  return new Date(J2000().getTime() + days * 86400000)
    .toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
}
function daysToInputVal(days) {
  const d = new Date(J2000().getTime() + days * 86400000);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function parseDateInputs(dateId, timeId) {
  const dv = document.getElementById(dateId).value;
  if (!dv) return null;
  const [y,mo,d] = dv.split('-').map(Number);
  const tv = document.getElementById(timeId).value;
  const [h,m] = tv ? tv.split(':').map(Number) : [12,0];
  return daysFromDate(y,mo,d,h,m);
}

function buildPlanetControls() {
  const c = document.getElementById('planetControls');
  c.innerHTML = '';
  PLANETS.forEach(p => {
    const cfg = planetSettings[p.name];
    const row = document.createElement('div'); row.className = 'planet-row';
    const dot = document.createElement('span'); dot.className = 'pdot';
    dot.style.background = `rgb(${p.color.join(',')})`;
    const chk = document.createElement('input'); chk.type = 'checkbox'; chk.checked = cfg.enabled; chk.id = `chk_${p.name}`;
    const lbl = document.createElement('label'); lbl.htmlFor = `chk_${p.name}`; lbl.textContent = p.name;
    const wrap = document.createElement('div'); wrap.className = 'tol-wrap';
    const slider = document.createElement('input'); slider.type = 'range'; slider.min=0; slider.max=100; slider.value=cfg.tolerance;
    const valSpan = document.createElement('span'); valSpan.className = 'tol-val'; valSpan.textContent = `${cfg.tolerance}%`;
    chk.addEventListener('change', () => { planetSettings[p.name].enabled = chk.checked; slider.disabled = !chk.checked; valSpan.style.opacity = chk.checked?'1':'0.3'; });
    slider.addEventListener('input', () => { planetSettings[p.name].tolerance = parseInt(slider.value); valSpan.textContent = `${slider.value}%`; });
    wrap.append(slider, valSpan); row.append(chk, dot, lbl, wrap); c.appendChild(row);
  });
}
buildPlanetControls();

document.getElementById('setDate').addEventListener('click', () => {
  const days = parseDateInputs('customDate','customTime');
  const err = document.getElementById('error');
  if (days === null) { err.style.display='block'; err.textContent='Please select a date.'; return; }
  err.style.display='none'; customDaysSinceJ2000 = days;
});
document.getElementById('resetDate').addEventListener('click', () => {
  customDaysSinceJ2000 = null;
  const t = new Date();
  document.getElementById('customDate').value = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
  document.getElementById('customTime').value = `${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
  document.getElementById('error').style.display = 'none';
});
document.getElementById('setCompare').addEventListener('click', () => {
  const days = parseDateInputs('compareDate','compareTime');
  const err = document.getElementById('error2');
  if (days === null) { err.style.display='block'; err.textContent='Please select a date.'; return; }
  err.style.display='none'; compareDaysSinceJ2000 = days;
  document.getElementById('compareNote').style.display='block';
});
document.getElementById('clearCompare').addEventListener('click', () => {
  compareDaysSinceJ2000 = null;
  document.getElementById('compareDate').value = '';
  document.getElementById('compareTime').value = '';
  document.getElementById('error2').style.display='none';
  document.getElementById('compareNote').style.display='none';
});

let navStepDays = 1;
document.querySelectorAll('.nav-step button').forEach(btn => {
  btn.addEventListener('click', () => {
    navStepDays = parseInt(btn.dataset.step);
    document.getElementById('navStepLabel').textContent =
      ({1:'1 day',7:'1 week',30:'1 month',365:'1 year'})[btn.dataset.step];
    document.querySelectorAll('.nav-step button').forEach(b => b.style.color='');
    btn.style.color='#99f';

function checkAlignments(primaryDays, compareDays) {
  return PLANETS.map(p => {
    const cfg = planetSettings[p.name];
    if (!cfg.enabled) return null;
    const diff = angDiff(helioLong(primaryDays, p), helioLong(compareDays, p));
    const pct  = closenessPct(diff);
    return { name: p.name, pct: pct.toFixed(0), aligned: pct >= cfg.tolerance, color: p.color };
  }).filter(Boolean);
}
function updateAlignmentStatus(primaryDays) {
  const div = document.getElementById('alignmentStatus');
  if (compareDaysSinceJ2000 === null) {
    div.innerHTML = '<span style="color:#334">Set a Compare Date to see alignment %.</span>'; return;
  }
  const results = checkAlignments(primaryDays, compareDaysSinceJ2000);
  if (!results.length) { div.innerHTML='<span style="color:#334">No planets selected.</span>'; return; }
  div.innerHTML = results.map(r =>
    `<div class="${r.aligned?'ok':'no'}">${r.aligned?'✓':'·'} <span style="color:rgb(${r.color.join(',')})">■</span> ${r.name}: ${r.pct}%${r.aligned?' <b>✓</b>':''}</div>`
  ).join('');
}

function fmtYears(yDiff) {
  const abs = Math.abs(yDiff); const sign = yDiff >= 0 ? '+' : '−';
  if (abs >= 1e9) return `${sign}${(abs/1e9).toFixed(2)}B yrs`;
  if (abs >= 1e6) return `${sign}${(abs/1e6).toFixed(2)}M yrs`;
  if (abs >= 1000) return `${sign}${(abs/1000).toFixed(1)}K yrs`;
  return `${sign}${abs.toFixed(1)} yrs`;
}
function daysToDisplayStr(days) {
  const absYr = Math.abs(days / 365.25);
  if (absYr > 10000) { const yr = Math.round(2000 + days / 365.25); return `Year ${yr} CE`; }
  return daysToDateStr(days);
}

document.getElementById('simScanBtn').addEventListener('click', () => {
  const status = document.getElementById('simStatus'); const list = document.getElementById('similarList');
  status.textContent = 'Scanning…'; list.innerHTML = '';
  setTimeout(() => {
    const primaryDays = getPrimaryDays(); const refs = {};
    PLANETS.forEach(p => { if (planetSettings[p.name].enabled) refs[p.name] = helioLong(primaryDays, p); });
    const planetNames = Object.keys(refs);
    if (!planetNames.length) { status.textContent = 'No planets selected.'; return; }
    const rangeYears = parseFloat(document.getElementById('scanRange').value);
    const rangeDays = rangeYears * 365.25;
    const totalSpan = (scanDirection === 'both' ? 2 : 1) * rangeDays;
    const rawStep = Math.max(5, totalSpan / 50000);
    const step = rawStep < 10 ? 5 : rawStep < 100 ? Math.round(rawStep/10)*10 : rawStep < 1000 ? Math.round(rawStep/100)*100 : rawStep < 10000 ? Math.round(rawStep/500)*500 : Math.round(rawStep/1000)*1000;
    const startOffset = scanDirection === 'future' ? 30 : -rangeDays;
    const endOffset = scanDirection === 'past' ? -30 : rangeDays;
    const results = [];
    const planets4scan = planetNames.map(name => ({ name, planet: PLANETS.find(p => p.name === name), ref: refs[name], tolerance: planetSettings[name].tolerance }));
    for (let offset = startOffset; offset <= endOffset; offset += step) {
      if (Math.abs(offset) < 30) continue;
      const d = primaryDays + offset; let allMatch = true, minPct = 100;
      for (const { planet, ref, tolerance } of planets4scan) {
        const pct = closenessPct(angDiff(helioLong(d, planet), ref));
        if (pct < tolerance) { allMatch = false; break; }
        if (pct < minPct) minPct = pct;
      }
      if (allMatch) {
        const last = results[results.length - 1]; const minSep = Math.max(60, step * 2);
        if (!last || Math.abs(d - last.days) > minSep) results.push({ days: d, score: minPct });
      }
    }
    results.sort((a, b) => b.score - a.score);
    const top = results.slice(0, 30);
    const stepDesc = step >= 365 ? `~${Math.round(step/365.25).toLocaleString()}yr step` : `${step}d step`;
    const minTol = Math.min(...planetNames.map(n => planetSettings[n].tolerance));
    if (!top.length) { status.textContent = `No matches (${stepDesc}, min tol: ${minTol}%).`; return; }
    status.textContent = `${top.length} result${top.length>1?'s':''} · ${stepDesc}`;
    top.forEach(r => {
      const item = document.createElement('div'); item.className = 'sim-item';
      const yDiff = (r.days - primaryDays) / 365.25;
      item.innerHTML = `<div class="sim-date">${daysToDisplayStr(r.days)}</div><div class="sim-detail">${fmtYears(yDiff)} · match ${r.score.toFixed(0)}%</div>`;
      item.addEventListener('click', () => {
        compareDaysSinceJ2000 = r.days;
        if (Math.abs(r.days / 365.25) < 100000) document.getElementById('compareDate').value = daysToInputVal(r.days);
        else document.getElementById('compareDate').value = '';
        document.getElementById('compareTime').value = '12:00';
        document.getElementById('compareNote').style.display = 'block';
        document.getElementById('error2').style.display = 'none';
      });
      list.appendChild(item);
    });
  }, 10);
});

// p5 SKETCH
// ─────────────────────────────────────────────────────────────────────────────
new p5(function(sk) {
  const BASE = 1100;
  const W = BASE, H = BASE, CX = W/2, CY = H/2;
  let canvasSize = BASE, scaleFactor = 1.0;

  function computeCanvasSize() {
    const isMobile = window.innerWidth <= 700;
    let availW, availH;
    if (isMobile) { availW = window.innerWidth - 12; availH = window.innerHeight * 0.60; }
    else {
      const sidebarEl = document.getElementById('sidebar');
      const sidebarCollapsed = sidebarEl && sidebarEl.classList.contains('collapsed');
      const sidebarW = (sidebarEl && !sidebarCollapsed) ? sidebarEl.getBoundingClientRect().width + 18 : 0;
      availW = window.innerWidth - sidebarW - 24;
      availH = window.innerHeight - 20;
    }
    canvasSize = Math.max(Math.min(availW * 0.98, availH * 0.98), 300);
    scaleFactor = canvasSize / BASE;
  }

  const STARS = [];
  for (let i = 0; i < 380; i++) {
    STARS.push({ x: Math.random()*W - W/2, y: Math.random()*H - H/2, r: Math.random()*1.4 + 0.2, a: Math.random()*180 + 60 });
  }

  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const QUARTER_COLORS = [
    [100,160,255],
    [ 80,210, 80],
    [255,160, 60],
    [200,100,255],
  ];
  const quarterIdx = [0, 3, 6, 9];

  sk.setup = function() {
    computeCanvasSize();
    const d = window.devicePixelRatio || 1;
    sk.pixelDensity(d);
    sk.createCanvas(canvasSize, canvasSize).parent('canvas-wrap');
    sk.textAlign(sk.CENTER, sk.CENTER);
    sk.loop();
  };
  sk.windowResized = function() { computeCanvasSize(); sk.pixelDensity(window.devicePixelRatio || 1); sk.resizeCanvas(canvasSize, canvasSize); };

  sk.draw = function() {
    sk.background(4, 4, 8);
    sk.translate(CX * scaleFactor, CY * scaleFactor);
    sk.scale(scaleFactor);

    const primaryDays = getPrimaryDays();
    const rotOff = getCanvasRotationOffset(primaryDays);

    const calYear = new Date(J2000().getTime() + primaryDays * 86400000).getFullYear();
    const monthAngles = [];
    for (let mo = 1; mo <= 12; mo++) {
      monthAngles.push(drawAngle(daysFromDate(calYear, mo, 1), PLANETS[2], rotOff));
    }

    drawStars(sk);
    drawCalendarOverlay(sk, primaryDays, rotOff, monthAngles);
    drawAnalogClock(sk, primaryDays, rotOff, monthAngles);
    drawSun(sk);

    if (compareDaysSinceJ2000 !== null) drawPlanets(sk, compareDaysSinceJ2000, primaryDays, rotOff, true);
    drawPlanets(sk, primaryDays, primaryDays, rotOff, false);

    drawDigitalClock(sk, primaryDays);
    updateAlignmentStatus(primaryDays);
  };

  function drawStars(sk) {
    sk.noStroke();
    STARS.forEach(s => {
      const twinkle = 0.85 + 0.15 * Math.sin(sk.millis()*0.001 + s.x);
      sk.fill(255, 255, 255, s.a * twinkle);
      sk.ellipse(s.x, s.y, s.r*2, s.r*2);
    });
  }

  function drawSun(sk) {
    for (let i = 8; i >= 1; i--) { sk.noStroke(); sk.fill(255, 200, 30, 12 - i*1.2); sk.ellipse(0, 0, (28 + i*10)*2, (28 + i*10)*2); }
    for (let i = 28; i >= 1; i--) {
      const t = i/28;
      sk.fill(sk.lerp(255,255,t), sk.lerp(240,140,t), sk.lerp(80,20,t));
      sk.noStroke(); sk.ellipse(0, 0, i*2, i*2);
    }
    sk.fill(255, 255, 220); sk.ellipse(0, 0, 10, 10);
  }

  function drawPlanetOrb(sk, x, y, p, alpha) {
    const s = p.size; const [r,g,b] = p.color; const [gr,gg,gb] = p.glowColor;
    for (let i = 4; i >= 1; i--) { sk.noStroke(); sk.fill(gr, gg, gb, (alpha * 0.18) / i); sk.ellipse(x, y, (s + i*5)*2, (s + i*5)*2); }
    for (let i = s; i >= 1; i--) {
      const t = 1 - i/s; const hl = Math.max(0, 1 - t*1.4);
      sk.fill(Math.min(255, r + hl*80), Math.min(255, g + hl*80), Math.min(255, b + hl*80), alpha);
      sk.ellipse(x + (1-t)*s*0.2, y + (1-t)*s*0.1, i*2, i*2);
    }
    sk.fill(255, 255, 255, alpha * 0.55); sk.ellipse(x - s*0.28, y - s*0.28, s*0.38, s*0.38);
    if (p.name === 'Saturn') {
      sk.noFill();
      sk.stroke(210, 185, 140, alpha * 0.6); sk.strokeWeight(1.5); sk.ellipse(x, y, s*3.2, s*0.7);
      sk.stroke(190, 165, 120, alpha * 0.35); sk.strokeWeight(1); sk.ellipse(x, y, s*3.8, s*0.85);
      sk.strokeWeight(1);
    }
  }

  const primaryPos = {};
  function drawPlanets(sk, days, primaryDays, rotOff, isCompare) {
    PLANETS.forEach((p, i) => {
      const a = drawAngle(days, p, rotOff);
      const x = p.radius * Math.cos(a), y = p.radius * Math.sin(a);
      const [or,og,ob] = ORBIT_COLORS[i];
      if (!isCompare) {
        primaryPos[p.name] = { x, y };
        sk.noFill(); sk.stroke(or, og, ob, 32); sk.strokeWeight(1); sk.ellipse(0, 0, p.radius*2, p.radius*2);
        if (compareDaysSinceJ2000 !== null) {
          const cfg = planetSettings[p.name];
          if (cfg && cfg.enabled) {
            const pct = closenessPct(angDiff(helioLong(primaryDays, p), helioLong(compareDaysSinceJ2000, p)));
            if (pct >= cfg.tolerance) { sk.noFill(); sk.stroke(p.color[0], p.color[1], p.color[2], 90); sk.strokeWeight(2.5); sk.ellipse(0,0,p.radius*2,p.radius*2); sk.strokeWeight(1); }
          }
        }
        drawPlanetOrb(sk, x, y, p, 255);
        sk.fill(200, 200, 215, 210); sk.noStroke(); sk.textSize(13); sk.textFont('Arial'); sk.text(p.name, x, y + p.size + 13);
      } else {
        const [r,g,b] = p.color; const s = p.size;
        sk.noStroke(); sk.fill(r, g, b, 55); sk.ellipse(x, y, s*2, s*2);
        sk.noFill(); sk.stroke(r, g, b, 220); sk.strokeWeight(1.5); sk.ellipse(x, y, s*2, s*2); sk.strokeWeight(1);
        if (p.name === 'Saturn') { sk.noFill(); sk.stroke(r, g, b, 140); sk.strokeWeight(1); sk.ellipse(x, y, s*3.2, s*0.7); sk.ellipse(x, y, s*3.8, s*0.85); sk.strokeWeight(1); }
        const nx = x / p.radius, ny = y / p.radius;
        const pp = primaryPos[p.name]; const overlapDist = pp ? Math.hypot(x - pp.x, y - pp.y) : 999;
        const isOverlap = overlapDist < s * 3.5;
        const labelOffset = s + (isOverlap ? s * 3.5 + 10 : 8);
        const lx = x + nx * labelOffset, ly = y + ny * labelOffset;
        if (isOverlap) {
          const lineEnd = s * 2.8 + 8; sk.stroke(r, g, b, 180); sk.strokeWeight(1);
          for (let seg = 0; seg < 5; seg++) { if (seg % 2 === 0) { const t0 = seg/5, t1 = (seg+0.55)/5; sk.line(x+nx*(s+t0*lineEnd), y+ny*(s+t0*lineEnd), x+nx*(s+t1*lineEnd), y+ny*(s+t1*lineEnd)); } }
        }
        sk.fill(r, g, b, isOverlap ? 230 : 180); sk.noStroke(); sk.textSize(11); sk.textFont('Arial'); sk.text(p.name[0]+'₂', lx, ly);
      }
    });
  }

  function drawDigitalClock(sk, primaryDays) {
    const isAncient = customDaysSinceJ2000 !== null && Math.abs(customDaysSinceJ2000 / 365.25) > 100000;
    const live = (!isAncient && customDaysSinceJ2000 === null) ? new Date() : (!isAncient ? new Date(J2000().getTime() + primaryDays * 86400000) : null);
    const hh = live ? String(live.getHours()).padStart(2,'0') : '--';
    const mm = live ? String(live.getMinutes()).padStart(2,'0') : '--';
    const ss = live ? String(live.getSeconds()).padStart(2,'0') : '--';
    const timeStr = `${hh}:${mm}:${ss}`;
    let dateStr;
    if (isAncient) {
      const yr = Math.round(2000 + customDaysSinceJ2000 / 365.25); const absYr = Math.abs(yr); const bce = yr < 0;
      if (absYr >= 1e9) dateStr = `~${(absYr/1e9).toFixed(2)}B ${bce?'BCE':'CE'}`;
      else if (absYr >= 1e6) dateStr = `~${(absYr/1e6).toFixed(1)}M ${bce?'BCE':'CE'}`;
      else if (absYr >= 1000) dateStr = `~${absYr.toLocaleString()} ${bce?'BCE':'CE'}`;
      else dateStr = `Year ${yr < 0 ? Math.abs(yr)+' BCE' : yr+' CE'}`;
    } else if (live) {
      dateStr = live.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });
    } else { dateStr = ''; }
    const bw = 190, bh = 68, margin = 10;
    const bx = -W/2 + margin, by = H/2 - margin - bh;
    sk.push(); sk.resetMatrix(); sk.translate(CX * scaleFactor, CY * scaleFactor); sk.scale(scaleFactor);
    sk.noStroke(); sk.fill(4, 5, 14, 200); sk.rect(bx, by, bw, bh, 7);
    sk.stroke(80, 80, 160, 60); sk.strokeWeight(1); sk.line(bx+7, by+1, bx+bw-7, by+1);
    sk.noFill(); sk.stroke(35, 35, 80, 130); sk.strokeWeight(1); sk.rect(bx, by, bw, bh, 7);
    sk.noStroke(); sk.fill(60, 160, 255, 30); sk.textSize(32); sk.textFont('Georgia'); sk.textAlign(sk.LEFT, sk.TOP);
    for (let dx=-1; dx<=1; dx++) for (let dy=-1; dy<=1; dy++) sk.text(timeStr, bx+12+dx, by+8+dy);
    sk.fill(110, 205, 255, 240); sk.text(timeStr, bx+12, by+8);
    sk.fill(180, 185, 225, 240); sk.textSize(14); sk.textFont('Arial'); sk.text(dateStr, bx+12, by+46);
    sk.textAlign(sk.CENTER, sk.CENTER); sk.pop();
  }

  function drawAnalogClock(sk, primaryDays, rotOff, monthAngles) {
    const isAncient = customDaysSinceJ2000 !== null && Math.abs(customDaysSinceJ2000 / 365.25) > 100000;
    const live = isAncient ? null : (customDaysSinceJ2000 === null ? new Date() : new Date(J2000().getTime() + primaryDays * 86400000));
    let hour, minute, month;
    if (live) { hour = live.getHours() % 12 + live.getMinutes()/60; minute = live.getMinutes() + live.getSeconds()/60; month = live.getMonth() + live.getDate()/31; }
    else { hour = 0; minute = 0; const fy = (primaryDays / 365.25) % 1; month = ((fy < 0 ? fy + 1 : fy) * 12); }

    const faceR = 440;

    sk.noFill(); sk.stroke(60, 60, 100, 80); sk.strokeWeight(1.5); sk.ellipse(0, 0, faceR*2, faceR*2);
    sk.stroke(80, 80, 140, 30); sk.strokeWeight(6); sk.ellipse(0, 0, faceR*2, faceR*2); sk.strokeWeight(1);

    for (let i = 0; i < 12; i++) {
      const a = monthAngles[i];
      const cx2 = Math.cos(a), cy2 = Math.sin(a);
      const isQ = (i % 3 === 0);
      const clockNum = i === 0 ? 12 : i;

      sk.stroke(isQ ? 190 : 95, isQ ? 190 : 95, isQ ? 250 : 150, isQ ? 180 : 80);
      sk.strokeWeight(isQ ? 2.5 : 1.2);
      sk.line(cx2*(faceR-16), cy2*(faceR-16), cx2*(faceR-2), cy2*(faceR-2));

      for (let t = 1; t < 5; t++) {
        const ta = a + (t/5)*(Math.PI*2/12);
        sk.stroke(50, 50, 90, 40); sk.strokeWeight(0.5);
        sk.line(Math.cos(ta)*(faceR-6), Math.sin(ta)*(faceR-6), Math.cos(ta)*(faceR-2), Math.sin(ta)*(faceR-2));
      }

      const numR = faceR - (isQ ? 30 : 23);
      const nx = cx2 * numR, ny = cy2 * numR;
      sk.noStroke();

      if (isQ) {
        sk.fill(5, 5, 20, 210);
        sk.rect(nx - 14, ny - 12, 28, 24, 6);
        sk.fill(230, 220, 255, 22); sk.textSize(24); sk.textStyle(sk.BOLD); sk.textFont('Georgia');
        for (let dx=-2; dx<=2; dx++) for (let dy=-2; dy<=2; dy++) sk.text(String(clockNum), nx+dx, ny+dy);
        sk.fill(255, 255, 255, 255); sk.textSize(24); sk.textStyle(sk.BOLD); sk.textFont('Georgia');
        sk.text(String(clockNum), nx, ny);
      } else {
        sk.fill(5, 5, 20, 170);
        sk.rect(nx - 12, ny - 10, 24, 20, 4);
        sk.fill(215, 212, 245, 230); sk.textSize(17); sk.textStyle(sk.NORMAL); sk.textFont('Georgia');
        sk.text(String(clockNum), nx, ny);
      }
      sk.textStyle(sk.NORMAL);
    }
    sk.strokeWeight(1);

    function clockAngle(frac) { return frac * Math.PI * 2 - Math.PI/2; }

    const monthA = clockAngle(month / 12);
    const mLen = faceR * 0.82;
    for (let g2 = 3; g2 >= 1; g2--) { sk.stroke(180, 100, 255, 40/g2); sk.strokeWeight(g2*4); sk.line(0, 0, Math.cos(monthA)*mLen, Math.sin(monthA)*mLen); }
    sk.stroke(200, 130, 255, 200); sk.strokeWeight(2); sk.line(0, 0, Math.cos(monthA)*mLen, Math.sin(monthA)*mLen);
    sk.fill(200, 130, 255, 200); sk.noStroke(); sk.ellipse(Math.cos(monthA)*mLen, Math.sin(monthA)*mLen, 5, 5);

    const hourA = clockAngle(hour / 12);
    const hLen = faceR * 0.38;
    sk.stroke(220, 235, 255, 225); sk.strokeWeight(3); sk.line(0, 0, Math.cos(hourA)*hLen, Math.sin(hourA)*hLen);
    sk.stroke(200, 220, 255, 80); sk.strokeWeight(2); sk.line(0, 0, Math.cos(hourA+Math.PI)*(hLen*0.2), Math.sin(hourA+Math.PI)*(hLen*0.2));

    const minA = clockAngle(minute / 60);
    const mhLen = faceR * 0.55;
    sk.stroke(160, 210, 255, 185); sk.strokeWeight(1.5); sk.line(0, 0, Math.cos(minA)*mhLen, Math.sin(minA)*mhLen);
    sk.stroke(150, 200, 255, 50); sk.strokeWeight(1); sk.line(0, 0, Math.cos(minA+Math.PI)*(mhLen*0.15), Math.sin(minA+Math.PI)*(mhLen*0.15));

    if (customDaysSinceJ2000 === null) {
      const sec = new Date().getSeconds() + new Date().getMilliseconds()/1000;
      const secA = clockAngle(sec / 60); const sLen = faceR * 0.65;
      sk.stroke(255, 90, 90, 205); sk.strokeWeight(1); sk.line(0, 0, Math.cos(secA)*sLen, Math.sin(secA)*sLen);
      sk.stroke(255, 80, 80, 80); sk.strokeWeight(1); sk.line(0, 0, Math.cos(secA+Math.PI)*(sLen*0.18), Math.sin(secA+Math.PI)*(sLen*0.18));
    }

    sk.noStroke(); sk.fill(80, 80, 140); sk.ellipse(0, 0, 8, 8);
    sk.fill(160, 160, 220); sk.ellipse(0, 0, 4, 4);
  }

  function drawCalendarOverlay(sk, primaryDays, rotOff, monthAngles) {
    const tickInner = 460, tickOuter = 480, labelR = 502;

    for (let qi = 0; qi < 4; qi++) {
      const startA = monthAngles[quarterIdx[qi]];
      const endA   = monthAngles[quarterIdx[(qi+1)%4]] + (qi===3 ? Math.PI*2 : 0);
      const [r,g,b] = QUARTER_COLORS[qi];
      sk.noFill(); sk.stroke(r, g, b, 24); sk.strokeWeight(18);
      sk.arc(0, 0, tickInner*2, tickInner*2, startA, endA);
      sk.strokeWeight(1);
    }

    quarterIdx.forEach((mi, qi) => {
      const a = monthAngles[mi]; const [r,g,b] = QUARTER_COLORS[qi];
      sk.stroke(r, g, b, 50); sk.strokeWeight(1.5);
      sk.line(0, 0, Math.cos(a)*(tickInner - 10), Math.sin(a)*(tickInner - 10));
      sk.strokeWeight(1);
    });

    for (let mi = 0; mi < 12; mi++) {
      const a = monthAngles[mi];
      const cx2 = Math.cos(a), cy2 = Math.sin(a);
      const qi  = quarterIdx.indexOf(mi);
      const isQ = qi !== -1;
      const [r, g, b] = isQ ? QUARTER_COLORS[qi] : [150, 150, 185];

      sk.stroke(r, g, b, isQ ? 255 : 150);
      sk.strokeWeight(isQ ? 2.5 : 1.2);
      const t0 = isQ ? tickInner - 8 : tickInner;
      const t1 = isQ ? tickOuter + 8 : tickOuter + 2;
      sk.line(cx2*t0, cy2*t0, cx2*t1, cy2*t1);
      sk.strokeWeight(1);

      const lx = cx2 * labelR, ly = cy2 * labelR;
      sk.noStroke();

      if (isQ) {
        const pillW = 44, pillH = 26;
        sk.fill(3, 3, 15, 235);
        sk.rect(lx - pillW/2, ly - pillH/2, pillW, pillH, 6);
        sk.noFill(); sk.stroke(r, g, b, 200); sk.strokeWeight(1.2);
        sk.rect(lx - pillW/2, ly - pillH/2, pillW, pillH, 6);
        sk.strokeWeight(1);
        sk.noStroke(); sk.fill(r, g, b, 16); sk.ellipse(lx, ly, pillW + 18, pillH + 18);
        sk.fill(r, g, b, 255);
        sk.textSize(16); sk.textStyle(sk.BOLD); sk.textFont('Georgia');
        sk.text(MONTHS[mi], lx, ly + 1);
        sk.textStyle(sk.NORMAL);
      } else {
        const pillW = 36, pillH = 20;
        sk.fill(3, 3, 15, 210);
        sk.rect(lx - pillW/2, ly - pillH/2, pillW, pillH, 4);
        sk.noFill(); sk.stroke(r, g, b, 90); sk.strokeWeight(0.8);
        sk.rect(lx - pillW/2, ly - pillH/2, pillW, pillH, 4);
        sk.strokeWeight(1);
        sk.noStroke(); sk.fill(220, 220, 240, 255);
        sk.textSize(13); sk.textStyle(sk.NORMAL); sk.textFont('Georgia');
        sk.text(MONTHS[mi], lx, ly + 0.5);
      }
    }
  }
});
